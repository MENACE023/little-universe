<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Living Notebook 🌙</title>

<link rel="stylesheet"
href="../style.css">

<link rel="stylesheet"
href="notebook.css">

</head>

<body>

<div class="notebook-container">

<div class="notebook-card">

<h1>
🌙 Living Notebook
</h1>

<p>
Ask the universe anything...
</p>

<input
type="text"
id="questionInput"
placeholder="Type your thought here..."
>

<button id="askBtn">
Ask The Universe ✨
</button>

<div id="responseBox">

The universe is listening...

</div>

<div class="stats">

Questions Asked:
<span id="questionCount">
0
</span>

</div>

</div>

</div>

<script src="notebook.js"></script>

</body>

</html>
